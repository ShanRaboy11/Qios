services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: qios
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - qios_node_modules:/app/node_modules
      - qios_next_cache:/app/.next
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    container_name: qios-db
    environment:
      POSTGRES_DB: qios
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "54322:5432"
    volumes:
      - qios_postgres_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d qios"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  qios_node_modules:
  qios_next_cache:
  qios_postgres_data:
